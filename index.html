    bx(c, p+20, q+30, 8, 12, '#1c0d0a', 2);
    c.strokeStyle='#c94f3f'; c.lineWidth=1.5;
    c.beginPath(); c.moveTo(m, q-4); c.lineTo(m, q+4); c.stroke();
    btr(c, m, q-4, m+9, q-1.5, m, q+1, '#c94f3f');
  } else if(eb.id==='etower'){
    bx(c, p+16, q+14, 16, 28, '#4a3232', 2);
    bx(c, p+12, q+6, 24, 10, '#5a3c3c', 2);
    bx(c, p+22, q+22, 4, 8, '#1c0d0a', 1);
  } else {
    bcir(c, m, q+30, 11, '#4f3232');
    btr(c, m, q+8, p+9, q+26, p+39, q+26, '#5f3a3a');
    bx(c, m-4, q+31, 8, 11, '#1c0d0a', 3);
  }
}

/* ---------- Arte vectorial del terreno ---------- */
function h2(x,y){ return ((Math.imul(x+13,374761393) ^ Math.imul(y+7,668265263))>>>8); }
function shadowEll(c,x,y,rx,ry,a){
  c.fillStyle=`rgba(0,0,0,${a})`;
  c.beginPath(); c.ellipse(x,y,rx,ry,0,0,Math.PI*2); c.fill();
}
function tri(c,cx,topY,halfW,h,col){
  c.fillStyle=col;
  c.beginPath();
  c.moveTo(cx,topY); c.lineTo(cx-halfW,topY+h); c.lineTo(cx+halfW,topY+h);
  c.closePath(); c.fill();
}
function drawTree(px,py,hh,full){
  const s=0.75+0.35*full;
  const cx=px+24+((hh%5)-2), base=py+40+((hh>>4)%3)-1;
  shadowEll(sctx,cx,base+1,12*s,4*s,.22);
  sctx.fillStyle='#6b4a2a';
  sctx.fillRect(cx-2, base-5, 4, 7);
  const G=[['#26521f','#347030','#478a41'],
           ['#2b5427','#3a7336','#4e8f47'],
           ['#234d21','#31672e','#44813e']][hh%3];
  tri(sctx,cx,base-26*s,15*s,22*s,G[0]);
  tri(sctx,cx,base-35*s,12*s,19*s,G[1]);
  tri(sctx,cx,base-43*s,8.5*s,16*s,G[2]);
  if(season()===3){   // nieve en las copas
    tri(sctx,cx,base-43*s,7*s,9*s,'rgba(245,250,255,.85)');
    tri(sctx,cx,base-35*s,9*s,8*s,'rgba(245,250,255,.55)');
  }
}
function drawStone(px,py,hh,full){
  const s=0.7+0.4*full, cx=px+24+((hh%3)-1), cy=py+27;
  shadowEll(sctx,cx,cy+8*s,13*s,4.5*s,.22);
  sctx.fillStyle='#7e837c';
  sctx.beginPath();
  sctx.moveTo(cx-12*s,cy+7*s); sctx.lineTo(cx-9*s,cy-6*s); sctx.lineTo(cx-1*s,cy-11*s);
  sctx.lineTo(cx+9*s,cy-5*s); sctx.lineTo(cx+12*s,cy+7*s);
  sctx.closePath(); sctx.fill();
  sctx.fillStyle='#9aa094';
  sctx.beginPath();
  sctx.moveTo(cx-9*s,cy-6*s); sctx.lineTo(cx-1*s,cy-11*s); sctx.lineTo(cx+9*s,cy-5*s); sctx.lineTo(cx-1*s,cy-2*s);
  sctx.closePath(); sctx.fill();
  sctx.fillStyle='#878b81';
  sctx.beginPath(); sctx.ellipse(cx+11*s, cy+6*s, 4*s, 3*s, 0, 0, Math.PI*2); sctx.fill();
}
function drawGold(px,py,hh,full){
  drawStone(px,py,hh,full);
  const s=0.7+0.4*full, cx=px+24+((hh%3)-1), cy=py+27;
  sctx.fillStyle='#e8c06a';
  sctx.beginPath(); sctx.ellipse(cx-4*s,cy-3*s,3.2*s,2.4*s,0.4,0,Math.PI*2); sctx.fill();
  sctx.beginPath(); sctx.ellipse(cx+4*s,cy+1*s,2.6*s,2*s,-0.4,0,Math.PI*2); sctx.fill();
  sctx.fillStyle='#f6e2a0';
  sctx.fillRect(cx-1, cy-9*s, 2, 6);
  sctx.fillRect(cx-3, cy-7*s, 6, 2);
}
function drawBerry(px,py,hh,full){
  const s=0.7+0.4*full, cx=px+24+((hh%5)-2), cy=py+29;
  shadowEll(sctx,cx,cy+6*s,12*s,4*s,.20);
  sctx.fillStyle='#3c6a2f';
  sctx.beginPath(); sctx.ellipse(cx-5*s,cy-2*s,8.5*s,7*s,0,0,Math.PI*2); sctx.fill();
  sctx.fillStyle='#487c39';
  sctx.beginPath(); sctx.ellipse(cx+5*s,cy-4*s,8.5*s,7*s,0,0,Math.PI*2); sctx.fill();
  sctx.fillStyle='#a83d7f';
  const pts=[[-7,-4],[-2,-8],[3,-2],[7,-6],[0,0],[-4,2],[6,1]];
  for(let i=0;i<pts.length;i++){
    if(i>4 && (hh>>i)%2===0) continue;
    sctx.beginPath(); sctx.arc(cx+pts[i][0]*s, cy+pts[i][1]*s, 2.1*s, 0, Math.PI*2); sctx.fill();
  }
  sctx.fillStyle='rgba(255,220,240,.8)';
  sctx.beginPath(); sctx.arc(cx-7.6*s, cy-4.7*s, 0.9, 0, Math.PI*2); sctx.fill();
}
function redrawStatic(){
  staticDirty=false;
  waterTiles=[];
  const isLand=(x,y)=>inB(x,y) && tiles[idx(x,y)].t!==T_WATER;
  // hierba con tonos variados (paleta según la estación)
  const sIdx=season();
  const grassTones=SEASON_GRASS[sIdx];
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    const px=x*TILE_PX, py=y*TILE_PX;
    sctx.fillStyle=grassTones[((Math.imul(x+7,374761393) ^ Math.imul(y+11,668265263))>>>8)%grassTones.length];
    sctx.fillRect(px,py,TILE_PX,TILE_PX);
    const hh=h2(x,y);
    if(hh%3===0){
      sctx.fillStyle='rgba(255,255,210,0.05)';
      sctx.fillRect(px+8+(hh%9), py+10+((hh>>5)%9), 4, 2);
      sctx.fillRect(px+26+((hh>>3)%7), py+29+((hh>>7)%7), 4, 2);
    }
    if(sIdx===3 && hh%2===0){   // copos de nieve en invierno
      sctx.fillStyle='rgba(255,255,255,0.55)';
      sctx.fillRect(px+6+(hh%33), py+5+((hh>>6)%35), 2, 2);
    }
    if(sIdx!==3 && hh%17===0){   // florecillas
      sctx.fillStyle=['#d8c86a','#c88ab0','#d8d8d8'][hh%3];
      sctx.fillRect(px+10+(hh%23), py+12+((hh>>4)%23), 2, 2);
    }
    // caminos desgastados por el paso
    const w=wear[idx(x,y)];
    if(w>6 && tiles[idx(x,y)].t===T_GRASS){
      sctx.fillStyle=`rgba(148,116,74,${Math.min(.42,(w-6)/90)})`;
      sctx.beginPath(); sctx.ellipse(px+24, py+24, 18, 15, 0, 0, Math.PI*2); sctx.fill();
    }
  }
  // agua con esquinas redondeadas y profundidad
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    if(tiles[idx(x,y)].t!==T_WATER) continue;
    const px=x*TILE_PX, py=y*TILE_PX;
    const lN=isLand(x,y-1), lS=isLand(x,y+1), lW=isLand(x-1,y), lE=isLand(x+1,y);
    const shore = lN||lS||lW||lE;
    sctx.fillStyle = shore ? '#2e5478' : '#284a6c';
    sctx.beginPath();
    sctx.roundRect(px,py,TILE_PX,TILE_PX,[lN&&lW?15:0, lN&&lE?15:0, lS&&lE?15:0, lS&&lW?15:0]);
    sctx.fill();
    if(shore){
      sctx.fillStyle='rgba(210,226,205,0.28)';
      if(lN) sctx.fillRect(px+(lW?14:0), py, TILE_PX-(lW?14:0)-(lE?14:0), 2.5);
      if(lS) sctx.fillRect(px+(lW?14:0), py+TILE_PX-2.5, TILE_PX-(lW?14:0)-(lE?14:0), 2.5);
      if(lW) sctx.fillRect(px, py+(lN?14:0), 2.5, TILE_PX-(lN?14:0)-(lS?14:0));
      if(lE) sctx.fillRect(px+TILE_PX-2.5, py+(lN?14:0), 2.5, TILE_PX-(lN?14:0)-(lS?14:0));
    }
    waterTiles.push([x,y]);
  }
  sctx.textAlign='center'; sctx.textBaseline='middle';
  // recursos del terreno (arte vectorial)
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    const c=tiles[idx(x,y)];
    if(!RES_OF_T[c.t]) continue;
    const full=Math.min(1, c.amt/T_AMT[c.t]);
    const px=x*TILE_PX, py=y*TILE_PX, hh=h2(x,y);
    if(c.t===T_TREE) drawTree(px,py,hh,full);
    else if(c.t===T_STONE) drawStone(px,py,hh,full);
    else if(c.t===T_GOLD) drawGold(px,py,hh,full);
    else if(c.t===T_BERRY) drawBerry(px,py,hh,full);
  }
  // edificios (arte vectorial, cada uno con silueta propia)
  for(const b of S.builds) drawBuilding(sctx, b);
  // poblado enemigo (modo Conquista)
  if(S.enemyBuilds) for(const eb of S.enemyBuilds) drawEnemyBuilding(sctx, eb);
}

function draw(){
  if(staticDirty) redrawStatic();
  ctx2d.setTransform(1,0,0,1,0,0);
  ctx2d.fillStyle='#1c2e16';
  ctx2d.fillRect(0,0,canvas.width,canvas.height);
  const s=cam.z*dpr;
  ctx2d.setTransform(s,0,0,s, -cam.x*s, -cam.y*s);
  ctx2d.imageSmoothingEnabled = cam.z<1;
  ctx2d.drawImage(SC,0,0);
  // destellos animados en el agua
  const wt=performance.now()/700;
  for(const [wx,wy] of waterTiles){
    const a=0.045+0.045*Math.sin(wt+(wx+wy)*0.9);
    ctx2d.fillStyle=`rgba(255,255,255,${a.toFixed(3)})`;
    ctx2d.fillRect(wx*TILE_PX+4, wy*TILE_PX+6+((wx*7+wy*13)%3)*13, TILE_PX-8, 3);
  }
  // tinte de la estación
  const seasonTint=SEASONS[season()].tint;
  if(seasonTint){
    ctx2d.fillStyle=seasonTint;
    ctx2d.fillRect(0,0,W*TILE_PX,H*TILE_PX);
  }
  // sombras de nubes a la deriva
  const ct=performance.now()/1000;
  ctx2d.fillStyle='rgba(8,12,6,0.07)';
  for(let i=0;i<3;i++){
    const span=W*TILE_PX+560;
    const cnx=(((ct*(8+i*5)) + i*570) % span) - 280;
    const cny=((i*467+130)%(H*TILE_PX));
    ctx2d.beginPath();
    ctx2d.ellipse(cnx, cny, 150, 80, 0, 0, Math.PI*2);
    ctx2d.ellipse(cnx+95, cny+35, 105, 60, 0, 0, Math.PI*2);
    ctx2d.fill();
  }
  if(fog){
    if(fogDirty) redrawFog();
    ctx2d.drawImage(FC2,0,0);
  }
  // pájaros cruzando el cielo
  ctx2d.strokeStyle='#181510'; ctx2d.lineWidth=1.8;
  for(const b of birds){
    const flap=Math.sin(performance.now()/90+b.o)*2;
    ctx2d.beginPath();
    ctx2d.moveTo(b.x-5, b.y+flap);
    ctx2d.quadraticCurveTo(b.x-2.5, b.y-3, b.x, b.y);
    ctx2d.quadraticCurveTo(b.x+2.5, b.y-3, b.x+5, b.y+flap);
    ctx2d.stroke();
  }
  // viñeta en los bordes del mundo
  const mw=W*TILE_PX, mh=H*TILE_PX, vg=80;
  const grads=[
    [0,0,vg,0, 0,0,vg,mh],[mw,0,mw-vg,0, mw-vg,0,vg,mh],
    [0,0,0,vg, 0,0,mw,vg],[0,mh,0,mh-vg, 0,mh-vg,mw,vg],
  ];
  for(const [gx1,gy1,gx2,gy2, rx,ry,rw,rh] of grads){
    const g=ctx2d.createLinearGradient(gx1,gy1,gx2,gy2);
    g.addColorStop(0,'rgba(10,8,4,.45)');
    g.addColorStop(1,'rgba(10,8,4,0)');
    ctx2d.fillStyle=g;
    ctx2d.fillRect(rx,ry,rw,rh);
  }
  ctx2d.textAlign='center'; ctx2d.textBaseline='middle';

  // selección
  if(selected){
    const pulse=0.6+0.4*Math.sin(performance.now()/300);
    ctx2d.strokeStyle=`rgba(232,192,106,${pulse})`;
    ctx2d.lineWidth=3;
    ctx2d.strokeRect(selected.x*TILE_PX+2, selected.y*TILE_PX+2, TILE_PX-4, TILE_PX-4);
  }
  // modo colocación: sombreado de casillas válidas
  if(placing){
    ctx2d.fillStyle='rgba(127,196,106,.22)';
    for(let y=0;y<H;y++) for(let x=0;x<W;x++){
      if(!placeError(placing,x,y)) ctx2d.fillRect(x*TILE_PX+2,y*TILE_PX+2,TILE_PX-4,TILE_PX-4);
    }
  }
  // aldeanos (dibujados, túnica según oficio)
  const JOB_COLORS={comida:'#c05a41', madera:'#8f6f42', piedra:'#8b9095', oro:'#d9a93c'};
  const nowT=performance.now();
  for(const v of villagers){
    ctx2d.fillStyle='rgba(0,0,0,.28)';
    ctx2d.beginPath();
    ctx2d.ellipse(v.px, v.py+4, 6.5, 2.6, 0, 0, Math.PI*2);
    ctx2d.fill();
    const walking = v.state==='to'||v.state==='back'||v.state==='home'||v.state==='explore'||v.state==='hunt';
    const bob = walking ? Math.abs(Math.sin(nowT/130+v.px))*-1.6 : 0;
    const x=v.px, y=v.py+bob;
    // piernas
    ctx2d.strokeStyle='#3d2c1c'; ctx2d.lineWidth=2;
    ctx2d.beginPath();
    if(walking){
      const ph=Math.sin(nowT/130+v.px)*3;
      ctx2d.moveTo(x-1.5,y-4); ctx2d.lineTo(x-1.5+ph, y+3.5);
      ctx2d.moveTo(x+1.5,y-4); ctx2d.lineTo(x+1.5-ph, y+3.5);
    } else {
      ctx2d.moveTo(x-1.8,y-4); ctx2d.lineTo(x-1.8, y+3.5);
      ctx2d.moveTo(x+1.8,y-4); ctx2d.lineTo(x+1.8, y+3.5);
    }
    ctx2d.stroke();
    // túnica
    ctx2d.fillStyle=JOB_COLORS[v.job]||'#7d92a0';
    ctx2d.beginPath();
    ctx2d.roundRect(x-4.5, y-14, 9, 11, [4,4,2,2]);
    ctx2d.fill();
    ctx2d.strokeStyle='rgba(0,0,0,.35)'; ctx2d.lineWidth=1;
    ctx2d.stroke();
    // cabeza y pelo
    ctx2d.fillStyle='#e9c49c';
    ctx2d.beginPath(); ctx2d.arc(x, y-17, 3.8, 0, Math.PI*2); ctx2d.fill();
    ctx2d.fillStyle='#5b4128';
    ctx2d.beginPath(); ctx2d.arc(x, y-18, 3.4, Math.PI, 2*Math.PI); ctx2d.fill();
    if(v.carry>0.5 && v.carryRes){
      // fardo del color del recurso
      ctx2d.fillStyle=RES_ACCENT[v.carryRes];
      ctx2d.beginPath(); ctx2d.arc(x+7.5, y-19, 4, 0, Math.PI*2); ctx2d.fill();
      ctx2d.strokeStyle='rgba(0,0,0,.4)'; ctx2d.lineWidth=1; ctx2d.stroke();
    } else if(v.state==='gather'){
      // pico balanceándose
      const ang=-1.1+Math.sin(nowT/140)*0.7;
      const hx=x+6, hy=y-9;
      ctx2d.strokeStyle='#5d4326'; ctx2d.lineWidth=2;
      ctx2d.beginPath();
      ctx2d.moveTo(hx, hy);
      ctx2d.lineTo(hx+Math.cos(ang)*9, hy+Math.sin(ang)*9);
      ctx2d.stroke();
      ctx2d.fillStyle='#9ba0a5';
      ctx2d.beginPath(); ctx2d.arc(hx+Math.cos(ang)*9, hy+Math.sin(ang)*9, 2.2, 0, Math.PI*2); ctx2d.fill();
    }
  }
  // alcance de la torre/castillo seleccionado
  if(ctxState && ctxState.kind==='build'){
    const atk=BLD[ctxState.b.id].attack;
    if(atk){
      ctx2d.strokeStyle='rgba(232,192,106,.5)';
      ctx2d.setLineDash([6,6]);
      ctx2d.lineWidth=2;
      ctx2d.beginPath();
      ctx2d.arc((ctxState.b.x+0.5)*TILE_PX, (ctxState.b.y+0.5)*TILE_PX, (atk.range+0.5*((ctxState.b.lvl||1)-1))*TILE_PX, 0, Math.PI*2);
      ctx2d.stroke();
      ctx2d.setLineDash([]);
    }
  }
  // flechas de las defensas
  const nowMs=performance.now();
  shots=shots.filter(s=>s.until>nowMs);
  ctx2d.lineWidth=2;
  for(const s of shots){
    ctx2d.strokeStyle = s.foe ? 'rgba(224,90,70,.9)' : 'rgba(232,192,106,.9)';
    ctx2d.beginPath();
    ctx2d.moveTo(s.x1,s.y1);
    ctx2d.lineTo(s.x2,s.y2);
    ctx2d.stroke();
  }
  // fauna (solo en terreno descubierto)
  for(const a of animals){
    const atx=Math.floor(a.px/TILE_PX), aty=Math.floor(a.py/TILE_PX);
    if(fog && inB(atx,aty) && !fog[idx(atx,aty)]) continue;
    ctx2d.fillStyle='rgba(0,0,0,.22)';
    ctx2d.beginPath();
    ctx2d.ellipse(a.px, a.py+4, 7, 2.5, 0, 0, Math.PI*2);
    ctx2d.fill();
    const ax=a.px, ay=a.py;
    const step2=Math.sin(performance.now()/160+ax)*1.5;
    if(a.kind==='deer'){
      ctx2d.strokeStyle='#7a5232'; ctx2d.lineWidth=1.8;
      ctx2d.beginPath();
      ctx2d.moveTo(ax-4, ay-3); ctx2d.lineTo(ax-4+step2, ay+3);
      ctx2d.moveTo(ax+4, ay-3); ctx2d.lineTo(ax+4-step2, ay+3);
      ctx2d.stroke();
      ctx2d.fillStyle='#a97b4f';
      ctx2d.beginPath(); ctx2d.ellipse(ax, ay-6, 7, 4.5, 0, 0, Math.PI*2); ctx2d.fill();
      ctx2d.beginPath(); ctx2d.arc(ax+7, ay-10, 3, 0, Math.PI*2); ctx2d.fill();
      ctx2d.strokeStyle='#6e4a28'; ctx2d.lineWidth=1.4;
      ctx2d.beginPath();
      ctx2d.moveTo(ax+7, ay-12); ctx2d.lineTo(ax+5, ay-17); ctx2d.moveTo(ax+6, ay-15); ctx2d.lineTo(ax+3.5, ay-16.5);
      ctx2d.moveTo(ax+8, ay-12); ctx2d.lineTo(ax+10, ay-17); ctx2d.moveTo(ax+9, ay-15); ctx2d.lineTo(ax+11.5, ay-16.5);
      ctx2d.stroke();
      ctx2d.fillStyle='#e8ddc8';
      ctx2d.beginPath(); ctx2d.arc(ax-7, ay-7, 1.6, 0, Math.PI*2); ctx2d.fill();
    } else {
      ctx2d.strokeStyle='#4a4a46'; ctx2d.lineWidth=1.8;
      ctx2d.beginPath();
      ctx2d.moveTo(ax-4, ay-2); ctx2d.lineTo(ax-4+step2, ay+3);
      ctx2d.moveTo(ax+4, ay-2); ctx2d.lineTo(ax+4-step2, ay+3);
      ctx2d.stroke();
      ctx2d.fillStyle='#6e6e6a';
      ctx2d.beginPath(); ctx2d.ellipse(ax, ay-5, 7.5, 4, 0, 0, Math.PI*2); ctx2d.fill();
      ctx2d.beginPath(); ctx2d.arc(ax+7, ay-8, 3.2, 0, Math.PI*2); ctx2d.fill();
      btr(ctx2d, ax+5, ay-11, ax+7, ay-14, ax+8.5, ay-10.5, '#5d5d59');
      btr(ctx2d, ax+8, ay-11, ax+10, ay-13.5, ax+11, ay-10, '#5d5d59');
      ctx2d.strokeStyle='#5d5d59'; ctx2d.lineWidth=2.5;
      ctx2d.beginPath(); ctx2d.moveTo(ax-7, ay-6); ctx2d.quadraticCurveTo(ax-12, ay-9, ax-13, ay-4); ctx2d.stroke();
      ctx2d.fillStyle='#c94f3f';
      ctx2d.beginPath(); ctx2d.arc(ax+9, ay-8.5, 1, 0, Math.PI*2); ctx2d.fill();
    }
  }
  // soldados (azules, con casco)
  for(const s of soldiers){
    const u=UNITS[s.kind];
    ctx2d.fillStyle='rgba(0,0,0,.28)';
    ctx2d.beginPath(); ctx2d.ellipse(s.px, s.py+4, 6.5, 2.6, 0, 0, Math.PI*2); ctx2d.fill();
    const sb=Math.abs(Math.sin(nowT/125+s.px))*-1.4;
    const sx2=s.px, sy2=s.py+sb;
    ctx2d.strokeStyle='#2c2c30'; ctx2d.lineWidth=2;
    const sph=Math.sin(nowT/125+s.px)*2.5;
    ctx2d.beginPath();
    ctx2d.moveTo(sx2-1.5,sy2-4); ctx2d.lineTo(sx2-1.5+sph, sy2+3.5);
    ctx2d.moveTo(sx2+1.5,sy2-4); ctx2d.lineTo(sx2+1.5-sph, sy2+3.5);
    ctx2d.stroke();
    ctx2d.fillStyle='#3f5d8f';
    ctx2d.beginPath(); ctx2d.roundRect(sx2-4.5, sy2-14, 9, 11, [4,4,2,2]); ctx2d.fill();
    ctx2d.strokeStyle='rgba(0,0,0,.4)'; ctx2d.lineWidth=1; ctx2d.stroke();
    ctx2d.fillStyle='#e9c49c';
    ctx2d.beginPath(); ctx2d.arc(sx2, sy2-17, 3.8, 0, Math.PI*2); ctx2d.fill();
    ctx2d.fillStyle='#9ba0a5';   // casco
    ctx2d.beginPath(); ctx2d.arc(sx2, sy2-18, 3.6, Math.PI, 2*Math.PI); ctx2d.fill();
    // arma
    ctx2d.strokeStyle='#b9bec4'; ctx2d.lineWidth=1.6;
    ctx2d.beginPath();
    if(s.kind==='arq'){
      ctx2d.arc(sx2+6, sy2-9, 5, -Math.PI/2.6, Math.PI/2.6);
    } else {
      ctx2d.moveTo(sx2+5, sy2-2); ctx2d.lineTo(sx2+8, sy2-19);
    }
    ctx2d.stroke();
    if(s.hp<u.hp){
      const w2=16, f=Math.max(0,s.hp/u.hp);
      ctx2d.fillStyle='rgba(0,0,0,.5)'; ctx2d.fillRect(sx2-w2/2, sy2-25, w2, 3);
      ctx2d.fillStyle='#6fa8ff'; ctx2d.fillRect(sx2-w2/2, sy2-25, w2*f, 3);
    }
  }
  // vida de los edificios enemigos dañados
  if(S.enemyBuilds) for(const eb of S.enemyBuilds){
    if(eb.hp>=eb.max) continue;
    if(fog && !fog[idx(eb.x,eb.y)]) continue;
    const bx3=eb.x*TILE_PX+4, by3=eb.y*TILE_PX-6;
    ctx2d.fillStyle='rgba(0,0,0,.55)'; ctx2d.fillRect(bx3, by3, 40, 5);
    ctx2d.fillStyle='#e07a5f'; ctx2d.fillRect(bx3, by3, 40*Math.max(0,eb.hp/eb.max), 5);
  }
  // invasores (solo en terreno descubierto)
  for(const e of enemies){
    const etx=Math.floor(e.px/TILE_PX), ety=Math.floor(e.py/TILE_PX);
    if(fog && inB(etx,ety) && !fog[idx(etx,ety)]) continue;
    ctx2d.fillStyle='rgba(0,0,0,.28)';
    ctx2d.beginPath();
    ctx2d.ellipse(e.px, e.py+4, 7, 2.8, 0, 0, Math.PI*2);
    ctx2d.fill();
    const eb=Math.abs(Math.sin(performance.now()/100+e.px))*-1.6;
    const ex=e.px, ey=e.py+eb;
    // piernas
    ctx2d.strokeStyle='#2c1d14'; ctx2d.lineWidth=2;
    const eph=Math.sin(performance.now()/100+e.px)*3;
    ctx2d.beginPath();
    ctx2d.moveTo(ex-1.5,ey-4); ctx2d.lineTo(ex-1.5+eph, ey+3.5);
    ctx2d.moveTo(ex+1.5,ey-4); ctx2d.lineTo(ex+1.5-eph, ey+3.5);
    ctx2d.stroke();
    // cuerpo encapuchado rojo oscuro
    ctx2d.fillStyle='#6d2019';
    ctx2d.beginPath();
    ctx2d.roundRect(ex-5, ey-14, 10, 11, [4,4,2,2]);
    ctx2d.fill();
    ctx2d.strokeStyle='rgba(0,0,0,.45)'; ctx2d.lineWidth=1;
    ctx2d.stroke();
    // capucha
    ctx2d.fillStyle='#4a1712';
    ctx2d.beginPath(); ctx2d.arc(ex, ey-16.5, 4.2, 0, Math.PI*2); ctx2d.fill();
    ctx2d.fillStyle='#1c0d0a';
    ctx2d.beginPath(); ctx2d.arc(ex, ey-16, 2.4, 0, Math.PI*2); ctx2d.fill();
    // arma
    ctx2d.strokeStyle='#b9bec4'; ctx2d.lineWidth=1.6;
    ctx2d.beginPath();
    ctx2d.moveTo(ex+5, ey-4); ctx2d.lineTo(ex+9, ey-13);
    ctx2d.stroke();
    // barra de vida
    const w=22, hpw=Math.max(0, w*e.hp/e.maxHp);
    ctx2d.fillStyle='rgba(0,0,0,.5)';
    ctx2d.fillRect(e.px-w/2, e.py-24, w, 4);
    ctx2d.fillStyle= e.hp/e.maxHp>0.4 ? '#e07a5f' : '#c03a2a';
    ctx2d.fillRect(e.px-w/2, e.py-24, hpw, 4);
    if(e.loot>=1 && e.lootRes){
      ctx2d.font='12px serif';
      ctx2d.fillText(RES_META[e.lootRes].icon, e.px+10, e.py-16);
    }
  }
  // vida del centro urbano (Supervivencia)
  if(S.mode==='oleadas' && S.tcHp<tcMaxHp()){
    const px=CX*TILE_PX, py=CY*TILE_PX;
    const w=TILE_PX-8;
    ctx2d.fillStyle='rgba(0,0,0,.6)';
    ctx2d.fillRect(px+4, py-8, w, 6);
    const frac=Math.max(0,S.tcHp/tcMaxHp());
    ctx2d.fillStyle= frac>0.5 ? '#7fc46a' : frac>0.25 ? '#e8c06a' : '#e07a5f';
    ctx2d.fillRect(px+4, py-8, w*frac, 6);
  }
  requestAnimationFrame(draw);
}

const mmc=document.getElementById('minimap');
const mmx=mmc.getContext('2d');
const MM=104/W;   // píxeles del minimapa por casilla
const MM_COL={[T_GRASS]:'#3f5c2d',[T_WATER]:'#2b4d6e',[T_TREE]:'#26521f',[T_BERRY]:'#7a3560',[T_STONE]:'#7d838a',[T_GOLD]:'#c9a03f'};
function drawMinimap(){
  if(!tiles) return;
  mmx.fillStyle='#0d0a06';
  mmx.fillRect(0,0,104,104);
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    if(fog && !fog[idx(x,y)]) continue;
    mmx.fillStyle=MM_COL[tiles[idx(x,y)].t]||'#3f5c2d';
    mmx.fillRect(x*MM, y*MM, MM+0.5, MM+0.5);
  }
  for(const b of S.builds){
    mmx.fillStyle = b.id==='ayunta' ? '#ffe9a0' : '#e8c06a';
    mmx.fillRect(b.x*MM-0.5, b.y*MM-0.5, MM+1, MM+1);
  }
  if(S.enemyBuilds) for(const eb of S.enemyBuilds){
    if(fog && !fog[idx(eb.x,eb.y)]) continue;
    mmx.fillStyle='#c0392b';
    mmx.fillRect(eb.x*MM-0.5, eb.y*MM-0.5, MM+1, MM+1);
  }
  mmx.fillStyle='#e8f4ff';
  for(const v of villagers) mmx.fillRect(v.px/TILE_PX*MM-1, v.py/TILE_PX*MM-1, 2, 2);
  mmx.fillStyle='#6fa8ff';
  for(const s of soldiers) mmx.fillRect(s.px/TILE_PX*MM-1, s.py/TILE_PX*MM-1, 2.5, 2.5);
  mmx.fillStyle='#ff5340';
  for(const e of enemies){
    const ex=Math.floor(e.px/TILE_PX), ey=Math.floor(e.py/TILE_PX);
    if(fog && inB(ex,ey) && !fog[idx(ex,ey)]) continue;
    mmx.fillRect(e.px/TILE_PX*MM-1.5, e.py/TILE_PX*MM-1.5, 3, 3);
  }
  // marco de la cámara
  mmx.strokeStyle='rgba(255,255,255,.75)';
  mmx.lineWidth=1;
  mmx.strokeRect(cam.x/TILE_PX*MM, cam.y/TILE_PX*MM, cw/cam.z/TILE_PX*MM, ch/cam.z/TILE_PX*MM);
}
setInterval(drawMinimap, 400);
mmc.addEventListener('pointerdown', e=>{
  e.stopPropagation();
  const r=mmc.getBoundingClientRect();
  const tx=(e.clientX-r.left)/r.width*W, ty=(e.clientY-r.top)/r.height*H;

  cam.y=ty*TILE_PX - ch/cam.z/2;

});

/* ---------------- Entrada (pan / zoom / tap) ---------------- */
const pointers=new Map();
let dragMoved=false, pinch0=null;
canvas.addEventListener('pointerdown', e=>{
  canvas.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY,sx:e.clientX,sy:e.clientY});
  if(pointers.size===1) dragMoved=false;
  if(pointers.size===2){
    const ps=[...pointers.values()];
    pinch0={d:Math.hypot(ps[0].x-ps[1].x, ps[0].y-ps[1].y), z:cam.z};
  }
});
canvas.addEventListener('pointermove', e=>{
  const p=pointers.get(e.pointerId);
  if(!p) return;
  const dx=e.clientX-p.x, dy=e.clientY-p.y;
  p.x=e.clientX; p.y=e.clientY;
  if(Math.hypot(e.clientX-p.sx, e.clientY-p.sy)>8) dragMoved=true;
  if(pointers.size===1){
    cam.x-=dx/cam.z; cam.y-=dy/cam.z; clampCam();
  } else if(pointers.size===2 && pinch0){
    const ps=[...pointers.values()];
    const d=Math.hypot(ps[0].x-ps[1].x, ps[0].y-ps[1].y);
    const mx=(ps[0].x+ps[1].x)/2, my=(ps[0].y+ps[1].y)/2;
    const rect=canvas.getBoundingClientRect();
    const wx=(mx-rect.left)/cam.z+cam.x, wy=(my-rect.top)/cam.z+cam.y;
    cam.z=pinch0.z*d/pinch0.d;
    clampCam();
    cam.x=wx-(mx-rect.left)/cam.z; cam.y=wy-(my-rect.top)/cam.z;
    clampCam();
  }
});
function endPointer(e){
  const p=pointers.get(e.pointerId);
  pointers.delete(e.pointerId);
  if(pointers.size<2) pinch0=null;
  if(p && !dragMoved && pointers.size===0 && e.type==='pointerup'){
    const rect=canvas.getBoundingClientRect();
    const wx=(e.clientX-rect.left)/cam.z+cam.x;
    const wy=(e.clientY-rect.top)/cam.z+cam.y;
    handleTap(Math.floor(wx/TILE_PX), Math.floor(wy/TILE_PX));
  }
}
canvas.addEventListener('pointerup', endPointer);
canvas.addEventListener('pointercancel', endPointer);
canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const wx=mx/cam.z+cam.x, wy=my/cam.z+cam.y;
  cam.z*= e.deltaY<0 ? 1.15 : 0.87;
  clampCam();
  cam.x=wx-mx/cam.z; cam.y=wy-my/cam.z;
  clampCam();
},{passive:false});
document.getElementById('z-in').onclick=()=>{ cam.z*=1.25; clampCam(); };
document.getElementById('z-out').onclick=()=>{ cam.z*=0.8; clampCam(); };

/* ---------------- Atajos de teclado (PC) ---------------- */
function toggleSheet(k){ if(sheetKind===k) closeSheet(); else openSheet(k); }
window.addEventListener('keyup', e=>{ if(e.key==='Shift') shiftHeld=false; });
window.addEventListener('keydown', e=>{
  if(e.key==='Shift'){ shiftHeld=true; return; }
  if(e.repeat || menuOpen || e.ctrlKey || e.metaKey || e.altKey) return;
  const k=e.key.toLowerCase();
  const pan=TILE_PX*2;
  const nodeAssign=(d)=>{
    if(ctxState && ctxState.kind==='node'){
      const c=tiles[idx(ctxState.x, ctxState.y)];
      const res=RES_OF_T[c.t];
      if(res){ setAssign(res, d, {x:ctxState.x, y:ctxState.y}); return true; }
    }
    return false;
  };
  switch(k){
    case 'b': toggleSheet('build'); break;
    case 't': toggleSheet('tech'); break;
    case 'm': toggleSheet('market'); break;
    case 'a': toggleSheet('pop'); break;
    case 'g': toggleSheet('more'); break;
    case 'e': toggleSheet('age'); break;
    case 'r': recruit(); break;
    case 'f': cycleSpeed(); break;
    case 'q':
      if(lastPlacedDef && lastPlacedDef.age<=S.age && !(lastPlacedDef.max && buildCount(lastPlacedDef.id)>=lastPlacedDef.max)) startPlacing(lastPlacedDef);
      break;
    case 'h': case ' ': centerCam(); e.preventDefault(); break;
    case 'escape':
      if(placing) stopPlacing();
      else if(sheetKind) closeSheet();
      else closeCtx();
      break;
    case '+': case '=': if(!nodeAssign(1)){ cam.z*=1.25; clampCam(); } break;
    case '-': case '_': if(!nodeAssign(-1)){ cam.z*=0.8; clampCam(); } break;
    case 'arrowup':    cam.y-=pan; clampCam(); e.preventDefault(); break;
    case 'arrowdown':  cam.y+=pan; clampCam(); e.preventDefault(); break;
    case 'arrowleft':  cam.x-=pan; clampCam(); e.preventDefault(); break;
    case 'arrowright': cam.x+=pan; clampCam(); e.preventDefault(); break;
  }
});

function handleTap(tx,ty){
  if(!inB(tx,ty)){ closeCtx(); return; }
  if(placing){ tryPlace(tx,ty); return; }
  if(fog && !fog[idx(tx,ty)]){ selected={x:tx,y:ty}; ctxState={kind:'explore', x:tx, y:ty}; refreshCtx(); return; }
  // ¿animal en esa casilla?
  const cxp=(tx+0.5)*TILE_PX, cyp=(ty+0.5)*TILE_PX;
  const a=animals.find(a=>Math.hypot(a.px-cxp, a.py-cyp)<0.85*TILE_PX);
  if(a){ selected={x:tx,y:ty}; ctxState={kind:'animal', a}; refreshCtx(); return; }
  const b=buildingAt(tx,ty);
  if(b){ selected={x:tx,y:ty}; openCtxBuilding(b); return; }
  const eb=S.enemyBuilds && S.enemyBuilds.find(e=>e.x===tx&&e.y===ty);
  if(eb){
    selected={x:tx,y:ty};
    ctxState={kind:'ebuild', eb};
    refreshCtx();
    return;
  }
  const c=tiles[idx(tx,ty)];
  if(RES_OF_T[c.t] && c.amt>0){ selected={x:tx,y:ty}; openCtxNode(tx,ty); return; }
  selected=null; closeCtx();
}
function exploreTo(x,y){
  const v=villagers.find(v=>v.job===null && (v.state==='idle'||v.state==='home'));
  if(!v){ toast('😴 Necesitas un aldeano libre (recluta uno o quítalo de una tarea).'); return; }
  if(!goTo(v, x, y, 'explore')){ toast('🚫 El explorador no encuentra camino hasta allí.'); return; }
  log('🔭 Un explorador parte hacia lo desconocido.');
  closeCtx();
}

const ctxEl=document.getElementById('ctx');

function closeCtx(){ ctxEl.style.display='none'; ctxState=null; selected=null; }
function openCtxNode(x,y){
  ctxState={kind:'node', x, y};
  refreshCtx();
}
function openCtxBuilding(b){
  ctxState={kind:'build', b};
  refreshCtx();
}
function refreshCtx(){
  if(!ctxState) return;
  ctxEl.style.display='block';
  if(ctxState.kind==='explore'){
    const libres=villagers.filter(v=>v.job===null && (v.state==='idle'||v.state==='home')).length;
    ctxEl.innerHTML=`
      <div class="c-head">
        <span class="c-icon">🌫️</span>
        <span class="c-title">Terreno inexplorado</span>
        <button class="c-close">✕</button>
      </div>
      <div class="c-desc">Nadie sabe qué hay ahí. Envía un aldeano libre a descubrirlo — puede que encuentre tesoros…</div>
      <div class="c-actions">
        <button id="ctx-explore" ${libres<1?'disabled':''}>🔭 Explorar (${libres} libre${libres===1?'':'s'})</button>
      </div>`;
    ctxEl.querySelector('.c-close').onclick=closeCtx;
    const eb=ctxEl.querySelector('#ctx-explore');
    if(eb) eb.onclick=()=>exploreTo(ctxState.x, ctxState.y);

  }
  if(ctxState.kind==='animal'){
    const a=ctxState.a;
    if(!animals.includes(a)){ closeCtx(); return; }
    if(a.kind==='deer'){
      ctxEl.innerHTML=`
        <div class="c-head">
          <span class="c-icon">🦌</span>
          <span class="c-title">Ciervo</span>
          <button class="c-close">✕</button>
        </div>
        <div class="c-desc">Carne fresca para tu poblado: +🍖80 al cazarlo. El ciervo intentará huir.</div>
        <div class="c-actions"><button id="ctx-hunt">🏹 Cazar</button></div>`;

        <div class="c-head">
          <span class="c-icon">🐺</span>
          <span class="c-title">Lobo</span>
          <button class="c-close">✕</button>
        </div>
        <div class="c-desc">Peligroso: persigue a los aldeanos alejados de la ciudad y les hace soltar la carga. Cerca del centro urbano están a salvo.</div>`;
    }
    ctxEl.querySelector('.c-close').onclick=closeCtx;
    return;
  }
  if(ctxState.kind==='ebuild'){
    const eb=ctxState.eb;
    if(!S.enemyBuilds || !S.enemyBuilds.includes(eb)){ closeCtx(); return; }

    ctxEl.querySelector('.c-close').onclick=closeCtx;

    }
    if(def.farm) extra=`<span style="font-size:12px;color:var(--dim)">Trabajadores: ${farmWorkers(b)}/${lvl} — asigna aldeanos a 🍖 comida y vendrán solos.</span>`;
    if(b.id==='cuartel'){
      extra=Object.keys(UNITS).map(k=>{
        const u=UNITS[k];

      else{

        upBtn=`<button id="ctx-upgrade" ${canPay(uc)?'':'disabled'}>⬆ Mejorar a Nv ${lvl+1} (${costTxt(uc)})</button>`;
      }
    }
    ctxEl.innerHTML=`

        <span class="c-icon">${b.id==='ayunta'?AGES[S.age].tc:def.icon}</span>
        <span class="c-title">${def.name}${NO_UPGRADE.has(b.id)?'':` · Nivel ${lvl}${lvl>1?' '+'⭐'.repeat(lvl-1):''}`}</span>
        <button class="c-close">✕</button>

      <div class="c-actions">

        ${upBtn}
        ${def.noBuild?'':'<button id="ctx-demolish">💥 Demoler</button>'}
      </div>`;
    ctxEl.querySelector('.c-close').onclick=closeCtx;
    ctxEl.querySelectorAll('[data-train]').forEach(btn=>btn.onclick=()=>trainUnit(btn.dataset.train, b));
    const rb=ctxEl.querySelector('#ctx-recruit');
    if(rb) rb.onclick=recruit;
    const ub=ctxEl.querySelector('#ctx-upgrade');

function openSheet(kind){
  sheetKind=kind;
  sheetEl.style.display='block'; sheetBack.style.display='block';
  refreshSheet();
}
document.getElementById('bottombar').querySelectorAll('button').forEach(b=>{
  b.onclick=()=>openSheet(b.dataset.sheet);
});
document.getElementById('btn-age').onclick=()=>openSheet('age');

function itemRow(icon,name,desc,cost,btnTxt,disabled,done,countTxt){
  return `<div class="item ${done?'done':''}">
    <span class="i-icon">${icon}</span>
    <div class="i-info">
      <div class="i-name">${name} ${countTxt?`<span class="i-count">${countTxt}</span>`:''}</div>
      <div class="i-desc">${desc}</div>
      <div class="i-cost">${cost}</div>
    </div>
    <button ${disabled?'disabled':''}>${btnTxt}</button>
  </div>`;
}
function refreshSheet(){
  if(!sheetKind) return;
  let html='';
  if(sheetKind==='build'){
    html=`<h2>🏗️ Construir <button class="sh-close">✕ Cerrar</button></h2>`;
    // en Supervivencia la torre está disponible desde la Edad de Piedra
    const effAge=b=>(S.mode==='oleadas' && b.id==='torre') ? 0 : b.age;
    const list=BUILDINGS.filter(b=>effAge(b)<=S.age && !b.noBuild && !(S.mode==='oleadas' && b.id==='maravilla'));
    for(const b of list){
      const n=buildCount(b.id);
      const maxed=b.max && n>=b.max;
      const c=buildCost(b);
      html+=itemRow(b.icon, b.name, b.desc + (b.placeTxt? ` · <b>${b.placeTxt}</b>`:''),
        maxed?'Construido':costTxt(c), maxed?'✓':'Colocar', maxed||!canPay(c), maxed, n>0?`×${n}`:'');
    }
    sheetEl.innerHTML=html;
    const btns=sheetEl.querySelectorAll('.item button');
    list.forEach((b,i)=>btns[i].onclick=()=>startPlacing(b));
  }
  else if(sheetKind==='tech'){
    html=`<h2>📜 Tecnología <button class="sh-close">✕ Cerrar</button></h2>`;
    const list=TECHS.filter(t=>t.age<=S.age);
    for(const t of list){
      const done=!!S.techs[t.id];
      const c=techCost(t);
      html+=itemRow(t.icon, t.name, t.desc, done?'Investigado':costTxt(c), done?'✓':'Investigar', done||!canPay(c), done, '');
    }
    sheetEl.innerHTML=html;
    const btns=sheetEl.querySelectorAll('.item button');
    list.forEach((t,i)=>btns[i].onclick=()=>research(t));
  }
  else if(sheetKind==='market'){
    html=`<h2>⚖️ Mercado <button class="sh-close">✕ Cerrar</button></h2>`;
    if(!M.trade){
      html+=`<div class="sheet-note">Construye un ⚖️ Mercado (Edad de Bronce) para comerciar con las caravanas.</div>`;
      sheetEl.innerHTML=html;
    } else {
      const deals=[
        {give:'comida', get:'oro', giveAmt:100, getAmt:30},
        {give:'madera', get:'oro', giveAmt:100, getAmt:30},
        {give:'piedra', get:'oro', giveAmt:100, getAmt:30},
        {give:'oro', get:'comida', giveAmt:60, getAmt:100},
        {give:'oro', get:'madera', giveAmt:60, getAmt:100},
        {give:'oro', get:'piedra', giveAmt:60, getAmt:100},
      ];
      for(const d of deals){
        html+=itemRow(`${RES_META[d.give].icon}➜${RES_META[d.get].icon}`,
          `Cambiar ${d.giveAmt} de ${RES_META[d.give].name.toLowerCase()}`,
          `Recibes ${RES_META[d.get].icon} ${d.getAmt} de ${RES_META[d.get].name.toLowerCase()}`,
          '', 'Cambiar', S.res[d.give]<d.giveAmt, false, '');
      }
      sheetEl.innerHTML=html;
      const btns=sheetEl.querySelectorAll('.item button');
      deals.forEach((d,i)=>btns[i].onclick=()=>trade(d.give,d.get,d.giveAmt,d.getAmt));
    }
  }
  else if(sheetKind==='pop'){
    html=`<h2>👥 Aldeanos: ${villagers.length}/${popCap()} <button class="sh-close">✕ Cerrar</button></h2>`;
    for(const r of RES){
      if(r==='oro' && S.age<1) continue;
      const n=assignCount(r);
      html+=`<div class="assign-row" data-res="${r}">
        <span class="a-label">${RES_META[r].icon} ${RES_META[r].name} <span style="color:var(--dim);font-size:12px">+${resRate(r).toFixed(1).replace('.',',')}/s</span></span>
        <button data-a="-1" ${n<=0?'disabled':''}>−</button>
        <span class="a-count">${n}</span>
        <button data-a="1" ${idleCount()<=0?'disabled':''}>＋</button>
      </div>`;
    }
    const rc=recruitCost();
    html+=`<div class="sheet-note">😴 ${idleCount()} aldeano(s) sin tarea.</div>
      <button id="sh-recruit" style="width:100%;padding:11px;font-weight:700" ${S.res.comida<rc||villagers.length>=popCap()?'disabled':''}>＋ Reclutar aldeano (🍖${fmt(rc)})</button>`;
    sheetEl.innerHTML=html;
    sheetEl.querySelectorAll('.assign-row').forEach(row=>{
      const r=row.dataset.res;
      row.querySelectorAll('[data-a]').forEach(btn=>btn.onclick=()=>setAssign(r,+btn.dataset.a,null));
    });
    sheetEl.querySelector('#sh-recruit').onclick=recruit;
  }
  else if(sheetKind==='age'){
    const next=S.age+1;
    html=`<h2>⬆ Avance de edad <button class="sh-close">✕ Cerrar</button></h2>`;
    if(next>=AGES.length){
      html+=`<div class="sheet-note">${AGES[5].icon} Has alcanzado la edad final. ${S.mode==='oleadas'?'Resiste todas las oleadas que puedas.':'Construye la 🗼 Maravilla para ganar la partida.'}</div>`;
      sheetEl.innerHTML=html;
    } else {
      const req=AGE_REQ[next];
      html+=`<div class="sheet-note">Para avanzar a <b style="color:var(--gold)">${AGES[next].icon} ${AGES[next].name}</b> necesitas:</div><div style="margin-bottom:10px">`;
      for(const r in req.cost){
        const ok=S.res[r]>=req.cost[r];
        html+=`<span class="req-item ${ok?'ok':''}">${ok?'✓':'○'} ${RES_META[r].icon} ${fmt(Math.min(S.res[r],req.cost[r]))}/${fmt(req.cost[r])}</span>`;
      }
      for(const id in req.builds){
        const def=BLD[id];
        const have=buildCount(id), need=req.builds[id];
        const ok=have>=need;
        html+=`<span class="req-item ${ok?'ok':''}">${ok?'✓':'○'} ${def.icon} ${def.name} ${Math.min(have,need)}/${need}</span>`;
      }
      html+=`</div><button id="sh-advance" style="width:100%;padding:12px;font-weight:700;font-size:15px" ${ageReady()?'':'disabled'}>${AGES[next].icon} Avanzar a la ${AGES[next].name}</button>`;
      sheetEl.innerHTML=html;
      sheetEl.querySelector('#sh-advance').onclick=advanceAge;
    }
  }
  else if(sheetKind==='more'){
    const st=S.stats;
    const h=Math.floor(st.time/3600), min=Math.floor((st.time%3600)/60);
    const nAch=Object.keys(S.ach).length;
    html=`<h2>⚙️ Más <button class="sh-close">✕ Cerrar</button></h2>
      <button id="sh-sound" style="width:100%;padding:10px;margin-bottom:10px;font-weight:600">${S.sound?'🔊 Sonido: activado':'🔇 Sonido: silenciado'}</button>
      <div class="sheet-note" style="margin-top:0"><b style="color:var(--gold)">📊 Estadísticas</b><br>
        ⏱️ Tiempo de juego: ${h?h+' h ':''}${min} min · ⚔️ Invasores abatidos: ${st.kills} · 🛡️ Incursiones vividas: ${st.raids} · ⚖️ Intercambios: ${st.trades}<br>
        🦌 Ciervos cazados: ${st.hunts||0} · ✨ Tesoros hallados: ${st.treasures||0} · 🔭 Mapa descubierto: ${fog?Math.round(fogCount/(W*H)*100):100}%<br>
        Recolectado en total: ${RES.map(r=>`${RES_META[r].icon}${fmt(st.g[r])}`).join(' · ')}
      </div>
      <div style="margin:10px 0 4px;font-weight:700;color:var(--gold)">🏆 Logros (${nAch}/${ACHS.length})</div>
      <div class="ach-grid">
        ${ACHS.map(a=>{
          const got=!!S.ach[a.id];
          return `<div class="ach ${got?'got':''}"><span class="ach-i">${got?a.icon:'🔒'}</span><div><div class="ach-n">${a.name}</div><div class="ach-d">${a.desc}</div></div></div>`;
        }).join('')}
      </div>
      <div style="margin:12px 0 4px;font-weight:700;color:var(--gold)">📜 Registro</div>
      <div id="log-list" style="max-height:150px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:6px 10px;margin-bottom:10px">
        ${logMsgs.map(l=>`<p class="${l.cls}">${l.msg}</p>`).join('') || '<p>Sin novedades.</p>'}
      </div>
      <div style="display:flex;gap:8px">
        <button id="sh-save" style="flex:1;padding:10px">💾 Guardar</button>
        <button id="sh-reset" style="flex:1;padding:10px;color:var(--red)">🔥 Reiniciar</button>
      </div>
      <div class="sheet-note">La partida se guarda sola cada 10 s en este dispositivo. Los aldeanos siguen trabajando (al 50%) aunque cierres el juego.</div>
      ${matchMedia('(pointer:fine)').matches ? `<div class="sheet-note">⌨️ <b style="color:var(--gold)">Atajos</b>: <b>B</b> construir · <b>T</b> tecnología · <b>M</b> mercado · <b>A</b> aldeanos · <b>E</b> edad · <b>G</b> este panel · <b>R</b> reclutar · <b>F</b> velocidad x1/x2/x3 · <b>Q</b> repetir último edificio · <b>Shift</b>+clic colocar en cadena · <b>flechas</b> mover cámara · <b>+/−</b> zoom (o asignar aldeanos con un recurso seleccionado) · <b>H</b> o <b>espacio</b> centrar · <b>Esc</b> cerrar</div>`:''}`;
    sheetEl.innerHTML=html;
    sheetEl.querySelector('#sh-sound').onclick=()=>{ S.sound=!S.sound; if(S.sound){ ac(); SFX.good(); } refreshSheet(); };
    sheetEl.querySelector('#sh-save').onclick=()=>{ save(); toast('💾 Partida guardada.'); };
    sheetEl.querySelector('#sh-reset').onclick=()=>{
      if(confirm('¿Seguro que quieres empezar de cero? Se borrará todo el progreso.')) hardReset();
    };
  }
  const closeBtn=sheetEl.querySelector('.sh-close');
  if(closeBtn) closeBtn.onclick=closeSheet;
}

/* ---------------- HUD ---------------- */
const resRefs={};
const RES_ACCENT={comida:'#c96f4f', madera:'#a1876a', piedra:'#9b9b95', oro:'#e0b95f'};
(function buildHUD(){
  const bar=document.getElementById('res-bar');
  for(const r of RES){
    const div=document.createElement('div');
    div.className='res-chip';
    div.style.borderTop='2px solid '+RES_ACCENT[r];
    div.innerHTML=`<div class="r-top">${RES_META[r].icon} <span class="r-val"></span></div><div class="r-rate"></div>`;
    div.onclick=()=>openSheet('pop');
    bar.appendChild(div);
    resRefs[r]={chip:div, val:div.querySelector('.r-val'), rate:div.querySelector('.r-rate')};
  }
})();
function updateHUD(){
  const cap=resCap();
  for(const r of RES){
    const R=resRefs[r];
    R.val.textContent=fmt(S.res[r]);
    const rt=resRate(r);
    R.rate.textContent=(rt>0?'+':'')+rt.toFixed(1).replace('.',',')+'/s · máx '+fmt(cap);
    R.rate.classList.toggle('pos', rt>0.05);
    R.chip.classList.toggle('full', S.res[r]>=cap-0.5);
    R.chip.classList.toggle('locked', r==='oro'&&S.age<1);
  }
  document.getElementById('age-lbl').textContent=`${AGES[S.age].icon} ${AGES[S.age].name}`;
  document.getElementById('pop-chip').textContent=`👥 ${totalPop()}/${popCap()}`;
  // banderín del ejército
  const af=document.getElementById('army-flag');
  if(soldiers.length){
    af.style.display='block';
    af.textContent=`⚔️ ${soldiers.length} · ${S.stance==='attack'?'🗡️ Atacando':'🛡️ Defendiendo'} (toca para cambiar)`;
  } else af.style.display='none';
  const btnA=document.getElementById('btn-age');
  if(S.age+1>=AGES.length){ btnA.style.display='none'; }
  else btnA.classList.toggle('locked', !ageReady());
  // estación
  const sd=SEASONS[season()];
  const scChip=document.getElementById('season-chip');
  scChip.textContent=sd.i;
  scChip.title=`${sd.n} · comida ${sd.mult>1?'+':''}${Math.round((sd.mult-1)*100)}%`;
  // chip de modo
  const mc=document.getElementById('mode-chip');
  if(S.mode==='reloj'){ mc.style.display='inline-block'; mc.textContent='⏱️ '+fmtTime(S.stats.time); }
  else if(S.mode==='oleadas'){ mc.style.display='inline-block'; mc.textContent='🌊 '+S.wave; }
  else mc.style.display='none';
  // aviso de incursión / oleada
  const rf=document.getElementById('raid-flag');
  if(enemies.length){
    rf.style.display='block';
    rf.textContent=`👺 ${enemies.length} invasor${enemies.length>1?'es':''}` +
      (S.mode==='oleadas' ? ` · 🏛️ ${Math.ceil(S.tcHp)}/${tcMaxHp()}` : '');
  } else if(raidPending){
    rf.style.display='block';
    rf.textContent='📯 Incursión inminente…';
  } else if(S.mode==='oleadas' && S.nextWave && !S.won && !S.dead){
    rf.style.display='block';
    rf.textContent=`🌊 Oleada ${S.wave+1} en ${Math.max(0,Math.ceil((S.nextWave-Date.now())/1000))} s · 🏛️ ${Math.ceil(S.tcHp)}/${tcMaxHp()}`;
  } else rf.style.display='none';
}

/* ---------------- Bucle ---------------- */
let lastFrame=performance.now();
function simTick(){
  const now=performance.now();
  const rawDt=Math.min((now-lastFrame)/1000, 0.5);
  lastFrame=now;
  const spd=S.speed||1;
  const dt=rawDt*spd;
  if(spd>1){
    // acelera también los temporizadores de reloj (eventos, incursiones, oleadas)
    const ms=(spd-1)*rawDt*1000;
    S.lastEvent-=ms;
    if(S.nextRaid) S.nextRaid-=ms;
    if(raidPending) raidPending-=ms;
    if(S.nextWave) S.nextWave-=ms;
    lastRegrow-=ms;
  }
  if(!S.won && !S.dead){
    for(const v of villagers) updateVillager(v, dt);
    for(const e of [...enemies]) updateEnemy(e, dt);
    for(const a of [...animals]) updateAnimal(a, dt);
    for(const s of [...soldiers]) updateSoldier(s, dt);
    updateEnemyTowers(dt);
    updateBirds(dt);
    if(Date.now()-lastAnimalTick>10000){ lastAnimalTick=Date.now(); maintainAnimals(); }
    updateDefenses(dt);
    maybeEvent(Date.now());
    maybeRaid(Date.now());
    maybeWave(Date.now());
    regrow(Date.now());
    if(S.mode==='oleadas' && !enemies.length && S.tcHp<tcMaxHp()) S.tcHp=Math.min(tcMaxHp(), S.tcHp+3*dt);
    tickSeason(dt);
    S.stats.time+=dt;
  }
}
setInterval(simTick, 100);
setInterval(()=>{ updateHUD(); checkAchs(); checkMission(); if(ctxState) refreshCtx(); if(sheetKind==='pop'||sheetKind==='age'||sheetKind==='market') refreshSheet(); }, 600);
setInterval(save, 10000);
setInterval(()=>{ if(wearDirty){ wearDirty=false; staticDirty=true; } }, 12000);   // repinta los caminos
window.addEventListener('beforeunload', save);
document.addEventListener('visibilitychange', ()=>{ if(document.hidden) save(); });
window.addEventListener('resize', resizeCanvas);

/* ---------------- Menú de modos ---------------- */
let menuOpen=false;
function showMenu(){
  menuOpen=true; noSave=true;
  const recs=getRecs();
  const cards=document.getElementById('menu-cards');
  cards.innerHTML='';
  for(const key in MODES){
    const m=MODES[key];
    let rec='';
    if(key==='reloj' && recs.bestTime) rec=`🏅 Tu récord: ${fmtTime(recs.bestTime)}`;
    if(key==='oleadas' && recs.bestWave) rec=`🏅 Mejor oleada: ${recs.bestWave}`;
    const btn=document.createElement('button');
    btn.className='mode-card';
    btn.innerHTML=`<span class="mc-icon">${m.icon}</span>
      <span style="flex:1;min-width:0">
        <span class="mc-name">${m.name}</span>
        <div class="mc-desc">${m.desc}</div>
        ${rec?`<div class="mc-rec">${rec}</div>`:''}
      </span>`;
    btn.onclick=()=>pickMode(key);
    cards.appendChild(btn);
  }
  document.getElementById('menu').classList.add('show');
}
function pickMode(mode){
  newGame();
  S.mode=mode;
  if(mode==='oleadas'){ S.wave=0; S.nextWave=Date.now()+150000; S.tcHp=600; }
  if(mode==='conquista') genEnemyVillage();
  menuOpen=false; noSave=false;
  M=calcMods(); staticDirty=true;
  animals=[];
  for(let i=0;i<7;i++) maintainAnimals();
  document.getElementById('z-speed').textContent='x'+S.speed;
  updateMissionBar();
  document.getElementById('menu').classList.remove('show');
  centerCam();
  save();
  log(`${MODES[mode].icon} Nueva partida en modo ${MODES[mode].name}.`, 'age');
  log('🪨 Tu tribu se asienta junto al río.');
  setTimeout(()=>toast('👉 Toca un 🌲 bosque o unas 🍇 bayas y pulsa ＋ para enviar aldeanos.'), 700);
  setTimeout(()=>toast('🏗️ Con «Construir» colocas edificios tocando el mapa.'), 6000);
  if(mode==='oleadas') setTimeout(()=>toast('🌊 La primera oleada llega en 2 min y medio. Tu centro urbano dispara, y las 🏹 torres ya están disponibles.'), 11000);
  if(mode==='conquista') setTimeout(()=>toast('🗡️ Un poblado rival se esconde en la niebla. Desarrolla tu economía, construye un ⚔️ Cuartel y entrena un ejército.'), 11000);
  updateHUD();
}

/* ---------------- Arranque ---------------- */
const loaded=load();
if(!loaded) newGame();          // partida de fondo mientras se elige modo
M=calcMods();
if(loaded){
  offlineGains();
  log('📜 Partida cargada. ¡Continúa tu imperio!');
} else {
  showMenu();
}
document.getElementById('btn-again').onclick=hardReset;
for(let i=0;i<7;i++) maintainAnimals();
document.getElementById('z-speed').textContent='x'+(S.speed||1);
updateMissionBar();
resizeCanvas();
centerCam();
if(S.won) winGame();
updateHUD();
requestAnimationFrame(draw);
</script>
